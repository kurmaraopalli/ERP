name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install API dependencies
      run: npm ci
      working-directory: apps/api
    
    - name: Install Web dependencies
      run: npm ci
      working-directory: apps/web
    
    - name: Build API
      run: npm run build
      working-directory: apps/api
    
    - name: Build Web
      run: npm run build
      working-directory: apps/web

  build-api:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
      working-directory: apps/api
    
    - name: Build API
      run: npm run build
      working-directory: apps/api
    
    - name: Upload API build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: api-build
        path: apps/api/dist

  build-web:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
      working-directory: apps/web
    
    - name: Fix vite permissions
      run: chmod +x node_modules/.bin/vite || true
      working-directory: apps/web
    
    - name: Build Web
      run: npm run build
      working-directory: apps/web
    
    - name: Upload Web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: apps/web/dist
